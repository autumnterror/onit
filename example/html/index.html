<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Список товаров</h1>

<button id="openCreateBtn">Создать товар</button>

<div id="error" class="error"></div>
<div id="list"></div>

<div id="modal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modalTitle">Создать товар</h2>

        <input id="title" placeholder="Название"/>
        <input id="description" placeholder="Описание"/>
        <input id="price" type="number" placeholder="Цена"/>
        <input id="photo" placeholder="Ссылка на фото"/>

        <button id="saveBtn">Сохранить</button>
        <button id="closeModalBtn">Закрыть</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
