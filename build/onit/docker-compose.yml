version: '3.8'

services:
  onit:
    depends_on:
      - db
    container_name: onit
    image: ghcr.io/autumnterror/onit/onit:latest
    volumes:
      - .env:/app/.env
    ports:
      - "8080:8080"
    restart: unless-stopped
  db:
    container_name: db
    image: postgres:latest
    ports:
      - "5432:5432"
    volumes:
      - onit-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  onit-data:
